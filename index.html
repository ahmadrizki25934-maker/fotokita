<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial Computing — Hand Control</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif}
#app{position:relative;width:100vw;height:100vh}

/* VIDEO: mirrored so user sees themselves naturally */
#video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
  transform:scaleX(-1);
  opacity:0.65;
}

/* HAND CANVAS: NOT CSS-mirrored. We manually flip coords in JS. */
#canvas-hand{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}

/* 3D canvas: no mirroring */
#canvas-3d{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}

#pointer{
  position:absolute;width:28px;height:28px;border-radius:50%;
  pointer-events:none;transform:translate(-50%,-50%);z-index:100;
  will-change:transform,left,top;
}
#pointer-core{
  position:absolute;inset:5px;border-radius:50%;
  background:rgba(255,255,255,0.95);
  transition:transform 0.08s,background 0.08s;
}
#pointer-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.55);
  animation:pointerPulse 2s ease-in-out infinite;
}
#pointer-glow{
  position:absolute;inset:-10px;border-radius:50%;
  background:radial-gradient(circle,rgba(120,180,255,0.35) 0%,transparent 70%);
}
@keyframes pointerPulse{0%,100%{transform:scale(1);opacity:0.55}50%{transform:scale(1.25);opacity:1}}

#pointer.pinching #pointer-core{background:rgba(80,200,255,1);transform:scale(0.55)}
#pointer.pinching #pointer-ring{border-color:rgba(80,200,255,0.85);animation:none;transform:scale(0.75)}
#pointer.pinching #pointer-glow{background:radial-gradient(circle,rgba(80,200,255,0.65) 0%,transparent 70%)}

#hud{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;z-index:200;pointer-events:none;
}
.hud-pill{
  background:rgba(255,255,255,0.07);backdrop-filter:blur(20px) saturate(180%);
  border:0.5px solid rgba(255,255,255,0.14);border-radius:100px;
  padding:8px 16px;font-size:12px;color:rgba(255,255,255,0.78);
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.hud-dot{width:6px;height:6px;border-radius:50%;background:rgba(80,220,80,0.9)}
.hud-dot.inactive{background:rgba(255,80,80,0.7)}

#gesture-indicator{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);
  border:0.5px solid rgba(255,255,255,0.14);border-radius:100px;
  padding:10px 20px;font-size:13px;color:rgba(255,255,255,0.9);
  z-index:200;pointer-events:none;transition:opacity 0.3s;opacity:0;
}
#gesture-indicator.visible{opacity:1}

#inspector{
  position:absolute;top:80px;right:20px;width:220px;
  background:rgba(10,10,18,0.72);backdrop-filter:blur(30px) saturate(180%);
  border:0.5px solid rgba(255,255,255,0.11);border-radius:16px;
  padding:16px;z-index:200;pointer-events:none;
  opacity:0;transition:opacity 0.3s;
}
#inspector.visible{opacity:1}
#inspector h3{font-size:11px;font-weight:500;color:rgba(255,255,255,0.38);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.insp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:0.5px solid rgba(255,255,255,0.05)}
.insp-label{font-size:11px;color:rgba(255,255,255,0.38)}
.insp-val{font-size:11px;font-weight:500;color:rgba(100,200,255,0.9);font-variant-numeric:tabular-nums}

#spawn-progress{position:absolute;display:none;z-index:201;pointer-events:none}

#help{position:absolute;bottom:30px;left:20px;z-index:200;pointer-events:none}
.help-row{font-size:11px;color:rgba(255,255,255,0.32);margin-bottom:4px;display:flex;gap:6px}
.help-gesture{color:rgba(255,255,255,0.52)}
</style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas-hand"></canvas>
  <canvas id="canvas-3d"></canvas>

  <div id="pointer">
    <div id="pointer-glow"></div>
    <div id="pointer-ring"></div>
    <div id="pointer-core"></div>
  </div>

  <div id="hud">
    <div class="hud-pill"><div class="hud-dot inactive" id="hand-dot"></div><span id="hand-status">No hand detected</span></div>
    <div class="hud-pill" id="gesture-pill">✋ Ready</div>
    <div class="hud-pill" id="obj-count-pill">0 objects</div>
  </div>

  <div id="gesture-indicator"></div>

  <div id="inspector">
    <h3>Object Inspector</h3>
    <div class="insp-row"><span class="insp-label">ID</span><span class="insp-val" id="i-id">—</span></div>
    <div class="insp-row"><span class="insp-label">Type</span><span class="insp-val" id="i-type">—</span></div>
    <div class="insp-row"><span class="insp-label">X</span><span class="insp-val" id="i-x">—</span></div>
    <div class="insp-row"><span class="insp-label">Y</span><span class="insp-val" id="i-y">—</span></div>
    <div class="insp-row"><span class="insp-label">Z</span><span class="insp-val" id="i-z">—</span></div>
    <div class="insp-row"><span class="insp-label">Rot X</span><span class="insp-val" id="i-rx">—</span></div>
    <div class="insp-row"><span class="insp-label">Rot Y</span><span class="insp-val" id="i-ry">—</span></div>
    <div class="insp-row"><span class="insp-label">Scale</span><span class="insp-val" id="i-sc">—</span></div>
    <div class="insp-row"><span class="insp-label">Status</span><span class="insp-val" id="i-st">—</span></div>
  </div>

  <div id="spawn-progress">
    <svg id="spawn-arc" width="60" height="60" viewBox="0 0 60 60" style="transform:rotate(-90deg)">
      <circle cx="30" cy="30" r="24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
      <circle id="spawn-arc-fill" cx="30" cy="30" r="24" fill="none"
        stroke="rgba(120,200,255,0.85)" stroke-width="3"
        stroke-dasharray="0 150.8" stroke-linecap="round"/>
    </svg>
  </div>

  <div id="help">
    <div class="help-row"><span class="help-gesture">✋ Hold 1s</span><span>Spawn object</span></div>
    <div class="help-row"><span class="help-gesture">👌 Pinch</span><span>Select / Grab</span></div>
    <div class="help-row"><span class="help-gesture">✊ Hold 1s</span><span>Delete selected</span></div>
    <div class="help-row"><span class="help-gesture">✌️ Peace</span><span>Focus mode</span></div>
    <div class="help-row"><span class="help-gesture">🤲 Two hands</span><span>Scale object</span></div>
  </div>
</div>

<script>
'use strict';

// ─── One Euro Filter ───────────────────────────────────────────────────────────
// Jansen 2012: removes jitter while preserving fast movement responsiveness.
class OneEuroFilter {
  constructor(freq=60, mincutoff=1.0, beta=0.007, dcutoff=1.0){
    this.freq=freq; this.mincutoff=mincutoff; this.beta=beta; this.dcutoff=dcutoff;
    this.xfilt=new LowPassFilter(this._alpha(mincutoff));
    this.dxfilt=new LowPassFilter(this._alpha(dcutoff));
    this.lasttime=undefined;
  }
  _alpha(cutoff){
    const te=1.0/this.freq;
    const tau=1.0/(2*Math.PI*cutoff);
    return 1.0/(1.0+tau/te);
  }
  filter(x, timestamp){
    if(this.lasttime!==undefined){
      this.freq=1.0/(timestamp-this.lasttime);
    }
    this.lasttime=timestamp;
    const dx=this.xfilt.hatxprev===undefined?0:(x-this.xfilt.hatxprev)*this.freq;
    const edx=this.dxfilt.filter(dx,this._alpha(this.dcutoff));
    const cutoff=this.mincutoff+this.beta*Math.abs(edx);
    return this.xfilt.filter(x, this._alpha(cutoff));
  }
}

class LowPassFilter {
  constructor(alpha){ this.alpha=alpha; this.hatxprev=undefined; }
  filter(x, alpha){
    if(alpha!==undefined) this.alpha=alpha;
    if(this.hatxprev===undefined){ this.hatxprev=x; return x; }
    const hatx=this.alpha*x+(1-this.alpha)*this.hatxprev;
    this.hatxprev=hatx;
    return hatx;
  }
}

// Per-landmark 3-axis One Euro Filter
class LandmarkOEF {
  constructor(mincutoff=3.5, beta=0.03){
    // 21 landmarks × 3 axes
    this.fx=[]; this.fy=[]; this.fz=[];
    for(let i=0;i<21;i++){
      this.fx.push(new OneEuroFilter(30, mincutoff, beta));
      this.fy.push(new OneEuroFilter(30, mincutoff, beta));
      this.fz.push(new OneEuroFilter(30, mincutoff, beta, 1.0));
    }
  }
  smooth(lms, ts){
    const out=[];
    for(let i=0;i<lms.length;i++){
      out.push({
        x: this.fx[i].filter(lms[i].x, ts),
        y: this.fy[i].filter(lms[i].y, ts),
        z: this.fz[i].filter(lms[i].z, ts),
      });
    }
    return out;
  }
}

// ─── Pointer smoothing (separate OEF for pointer) ─────────────────────────────
const ptrFilterX = new OneEuroFilter(60, 5.0, 0.1);
const ptrFilterY = new OneEuroFilter(60, 5.0, 0.1);

// ─── DOM Cache ────────────────────────────────────────────────────────────────
const video        = document.getElementById('video');
const canvasHand   = document.getElementById('canvas-hand');
const ctxHand      = canvasHand.getContext('2d', {alpha:true});
const pointer      = document.getElementById('pointer');
const handDot      = document.getElementById('hand-dot');
const handStatus   = document.getElementById('hand-status');
const gesturePill  = document.getElementById('gesture-pill');
const objCountPill = document.getElementById('obj-count-pill');
const gestureEl    = document.getElementById('gesture-indicator');
const inspector    = document.getElementById('inspector');
const spawnProgress= document.getElementById('spawn-progress');
const spawnArcFill = document.getElementById('spawn-arc-fill');
const inspEls = {
  id:document.getElementById('i-id'),   type:document.getElementById('i-type'),
  x: document.getElementById('i-x'),    y:   document.getElementById('i-y'),
  z: document.getElementById('i-z'),    rx:  document.getElementById('i-rx'),
  ry:document.getElementById('i-ry'),   sc:  document.getElementById('i-sc'),
  st:document.getElementById('i-st'),
};

// ─── Three.js Scene ───────────────────────────────────────────────────────────
const canvas3d = document.getElementById('canvas-3d');
const renderer = new THREE.WebGLRenderer({
  canvas:canvas3d, alpha:true, antialias:true, powerPreference:'high-performance'
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene   = new THREE.Scene();
const cam3d   = new THREE.PerspectiveCamera(55, 1, 0.01, 200);
cam3d.position.set(0, 0, 5);

// Lighting
scene.add(new THREE.AmbientLight(0x8899ff, 0.45));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(512, 512); // reduced for perf
scene.add(dirLight);
const rimLight  = new THREE.PointLight(0x4488ff, 0.85, 20);
rimLight.position.set(-4, 2, 2);
scene.add(rimLight);
const fillLight = new THREE.PointLight(0xff8844, 0.55, 15);
fillLight.position.set(3, -2, 1);
scene.add(fillLight);

// ─── Reusable vectors (avoid GC) ─────────────────────────────────────────────
const _vec2   = new THREE.Vector2();
const _vec3a  = new THREE.Vector3();
const _vec3b  = new THREE.Vector3();
const _raycaster = new THREE.Raycaster();

function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  cam3d.aspect = w / h;
  cam3d.updateProjectionMatrix();
  canvasHand.width  = w;
  canvasHand.height = h;
}
resize();
window.addEventListener('resize', resize, {passive:true});

// ─── Object System ────────────────────────────────────────────────────────────
const MAX_OBJECTS   = 20;
const objects       = [];
const OBJECT_TYPES  = ['cube','sphere','panel','torus','octahedron'];
const OBJ_COLORS    = [0x4488ff,0xff6644,0x44ff88,0xffaa44,0xcc44ff,0x44ccff];
let   nextId        = 1;
let   typeIndex     = 0;
let   selectedObject= null;

function makeMesh(type, color){
  let geo;
  if(type==='cube')       geo = new THREE.BoxGeometry(0.5,0.5,0.5);
  else if(type==='sphere') geo = new THREE.SphereGeometry(0.3,24,24);
  else if(type==='panel')  geo = new THREE.BoxGeometry(1.2,0.7,0.04);
  else if(type==='torus')  geo = new THREE.TorusGeometry(0.3,0.1,12,36);
  else                     geo = new THREE.OctahedronGeometry(0.35);

  const mat = new THREE.MeshStandardMaterial({
    color, emissive:0x000000, emissiveIntensity:0.08,
    roughness:0.28, metalness:0.72
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;

  // Outline
  const outlineMesh = new THREE.Mesh(
    geo.clone(),
    new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.BackSide})
  );
  outlineMesh.scale.setScalar(1.045);
  outlineMesh.visible = false;
  mesh.add(outlineMesh);

  return {mesh, outline:outlineMesh};
}

function spawnObject(wx, wy, wz){
  if(objects.length >= MAX_OBJECTS) return;
  const type  = OBJECT_TYPES[typeIndex++ % OBJECT_TYPES.length];
  const color = OBJ_COLORS[Math.floor(Math.random()*OBJ_COLORS.length)];
  const {mesh, outline} = makeMesh(type, color);

  mesh.position.set(wx, wy, wz);
  scene.add(mesh);

  const obj = {
    id: nextId++, type, mesh, outline, color,
    posX:wx, posY:wy, posZ:wz,
    velX:0,  velY:0,  velZ:0,
    rotX:0,  rotY:0,  rotZ:0,
    scale:1,
    selected:false, grabbed:false, hovered:false,
    birthProgress:0,
    dying:false, deathProgress:0,
  };
  objects.push(obj);
  showGesture(`✨ ${type} spawned`);
  updateObjCount();
  return obj;
}

function deleteObject(obj){
  if(obj.dying) return;
  obj.dying = true;
  obj.deathProgress = 0;
  obj.mesh.material.transparent = true;
  showGesture('💥 Deleted');
}

function selectObject(obj){
  if(selectedObject && selectedObject !== obj){
    selectedObject.selected = false;
    selectedObject.outline.visible = false;
    selectedObject.mesh.material.emissiveIntensity = 0.08;
  }
  selectedObject = obj;
  if(obj){
    obj.selected = true;
    obj.outline.visible = true;
    obj.mesh.material.emissiveIntensity = 0.32;
    inspector.classList.add('visible');
  } else {
    inspector.classList.remove('visible');
  }
}

function updateObjCount(){
  const alive = objects.filter(o=>!o.dying).length;
  objCountPill.textContent = `${alive} object${alive!==1?'s':''}`;
}

// ─── Coordinate Conversion ────────────────────────────────────────────────────
// MediaPipe normalizes [0,1] x[0,1], origin top-left.
// Video has CSS scaleX(-1) so it shows mirror image to user.
// To display landmarks ON TOP of the mirrored video we must ALSO mirror the x:
//   screen_x = (1 - lm.x) * width      ← mirrors x so it aligns with CSS-mirrored video
//   screen_y = lm.y * height
//
// For Three.js NDC:
//   ndcX = (screen_x / width)  * 2 - 1   (standard, no extra flip needed)
//   ndcY = -(screen_y / height) * 2 + 1

function lmToScreen(lm){
  // Mirror x to match CSS scaleX(-1) on video
  return {
    x: (1 - lm.x) * window.innerWidth,
    y: lm.y * window.innerHeight,
  };
}

function screenToNDC(sx, sy){
  const w = window.innerWidth, h = window.innerHeight;
  return {x: (sx/w)*2-1, y: -(sy/h)*2+1};
}

function screenToWorld(sx, sy, targetZ=0){
  const ndc = screenToNDC(sx, sy);
  _vec2.set(ndc.x, ndc.y);
  _raycaster.setFromCamera(_vec2, cam3d);
  const dir   = _raycaster.ray.direction;
  const orig  = _raycaster.ray.origin;
  const t     = (targetZ - orig.z) / dir.z;
  return {
    x: orig.x + dir.x * t,
    y: orig.y + dir.y * t,
    z: targetZ,
  };
}

function raycastObjects(sx, sy){
  const ndc = screenToNDC(sx, sy);
  _vec2.set(ndc.x, ndc.y);
  _raycaster.setFromCamera(_vec2, cam3d);
  const meshes = [];
  for(let i=0; i<objects.length; i++){
    if(!objects[i].dying) meshes.push(objects[i].mesh);
  }
  const hits = _raycaster.intersectObjects(meshes, false);
  if(!hits.length) return null;
  return objects.find(o => o.mesh === hits[0].object) || null;
}

// ─── Hand Tracking State ──────────────────────────────────────────────────────
const oefHands    = [new LandmarkOEF(3.5, 0.035), new LandmarkOEF(3.5, 0.035)];
let smoothedHands = [null, null];

let ptrSX = window.innerWidth*0.5, ptrSY = window.innerHeight*0.5;
let handResultsPending = null; // double-buffer: tracking writes here

// Pinch state
const pinch = [{active:false, wasActive:false}, {active:false, wasActive:false}];
const grab  = [{obj:null, offX:0, offY:0, prevLmZ:null}, {obj:null, offX:0, offY:0, prevLmZ:null}];

// Gesture timers
let spawnTime=0, spawnFired=false;
let deleteTime=0, deleteFired=false;
let focusMode=false;
let peaceWas=false;
let twoHandScaleBase=null, twoHandScaleObj=null;

// Gesture notification
let lastGestureText='';
let gestureTimerID=null;
function showGesture(text){
  if(text===lastGestureText) return;
  lastGestureText=text;
  gestureEl.textContent=text;
  gestureEl.classList.add('visible');
  clearTimeout(gestureTimerID);
  gestureTimerID=setTimeout(()=>{
    gestureEl.classList.remove('visible');
    setTimeout(()=>{ lastGestureText=''; }, 350);
  }, 2100);
}
function setGesturePill(t){ gesturePill.textContent=t; }

// ─── Gesture Detection ────────────────────────────────────────────────────────
function dist3(a,b){ return Math.hypot(a.x-b.x, a.y-b.y, a.z-b.z); }
function dist2(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

// Pinch: thumb tip (4) close to index tip (8)
function isPinch(lms){
  return dist3(lms[4], lms[8]) < 0.068;
}

// Open palm: all 4 fingers extended, thumb away from index
function isOpenPalm(lms){
  const extended = [8,12,16,20].every(i => lms[i].y < lms[i-2].y);
  return extended && dist3(lms[4], lms[8]) > 0.10;
}

// Fist: all fingertips curl below knuckles
function isFist(lms){
  return [8,12,16,20].every(i => lms[i].y > lms[5].y);
}

// Peace: index+middle up, ring+pinky down
function isPeace(lms){
  return lms[8].y < lms[6].y && lms[12].y < lms[10].y
      && lms[16].y > lms[14].y && lms[20].y > lms[18].y;
}

// ─── Hand Skeleton Drawing ────────────────────────────────────────────────────
// Defined once, not every frame
const HAND_CONNECTIONS_LIST=[
  [0,1],[1,2],[2,3],[3,4],         // thumb
  [0,5],[5,6],[6,7],[7,8],         // index
  [5,9],[9,10],[10,11],[11,12],    // middle
  [9,13],[13,14],[14,15],[15,16],  // ring
  [13,17],[17,18],[18,19],[19,20], // pinky
  [0,17]                           // palm edge
];
const FINGER_TIPS = new Set([4,8,12,16,20]);

// Pre-allocated screen point arrays per hand
const screenPts = [
  Array.from({length:21}, ()=>({x:0,y:0})),
  Array.from({length:21}, ()=>({x:0,y:0})),
];

// Particle system (pooled)
const PARTICLE_POOL_SIZE = 80;
const particlePool = Array.from({length:PARTICLE_POOL_SIZE}, ()=>({
  x:0,y:0,vx:0,vy:0,life:0,active:false,color:''
}));
let pHead=0; // pool head

function emitParticle(cx,cy,color){
  const p = particlePool[pHead % PARTICLE_POOL_SIZE];
  pHead++;
  p.x=cx; p.y=cy;
  p.vx=(Math.random()-0.5)*3.2;
  p.vy=(Math.random()-0.5)*3.2;
  p.life=1.0; p.active=true; p.color=color;
}

function drawHand(lms, hi, ts){
  const w = canvasHand.width, h = canvasHand.height;
  const pts = screenPts[hi];
  const isLeft = hi===0;
  const baseColor = isLeft ? '100,180,255' : '255,160,80';
  const glowColor = isLeft ? '60,140,255'  : '255,120,40';

  // Compute screen points (mirrored)
  for(let i=0;i<lms.length;i++){
    const sc = lmToScreen(lms[i]);
    pts[i].x = sc.x;
    pts[i].y = sc.y;
  }

  // Connections — batch draw for performance
  ctxHand.save();
  ctxHand.shadowColor = `rgba(${glowColor},0.75)`;
  ctxHand.shadowBlur = 14;
  ctxHand.strokeStyle = `rgba(${baseColor},0.88)`;
  ctxHand.lineWidth = 2;
  ctxHand.lineCap = 'round';
  ctxHand.beginPath();
  for(const [a,b] of HAND_CONNECTIONS_LIST){
    ctxHand.moveTo(pts[a].x, pts[a].y);
    ctxHand.lineTo(pts[b].x, pts[b].y);
  }
  ctxHand.stroke();
  ctxHand.restore();

  // Joints
  for(let i=0;i<21;i++){
    const isTip = FINGER_TIPS.has(i);
    const r = isTip ? 6 : 3.5;
    ctxHand.save();
    ctxHand.shadowColor = `rgba(${glowColor},1)`;
    ctxHand.shadowBlur = isTip ? 18 : 8;
    ctxHand.beginPath();
    ctxHand.arc(pts[i].x, pts[i].y, r, 0, 6.2832);
    ctxHand.fillStyle = isTip ? `rgba(${baseColor},1)` : 'rgba(255,255,255,0.82)';
    ctxHand.fill();
    ctxHand.restore();
    // Inner white dot
    ctxHand.beginPath();
    ctxHand.arc(pts[i].x, pts[i].y, r*0.35, 0, 6.2832);
    ctxHand.fillStyle = 'rgba(255,255,255,0.95)';
    ctxHand.fill();
  }

  // Emit particles from index tip (hand 0 only)
  if(hi===0 && Math.random()<0.25){
    emitParticle(pts[8].x, pts[8].y, `rgba(${baseColor},`);
  }
}

function drawParticles(){
  for(let i=0;i<PARTICLE_POOL_SIZE;i++){
    const p = particlePool[i];
    if(!p.active) continue;
    p.x+=p.vx; p.y+=p.vy;
    p.life-=0.055;
    if(p.life<=0){ p.active=false; continue; }
    ctxHand.beginPath();
    ctxHand.arc(p.x, p.y, 2*p.life, 0, 6.2832);
    ctxHand.fillStyle = p.color + p.life.toFixed(2) + ')';
    ctxHand.fill();
  }
}

// ─── MediaPipe Callback ───────────────────────────────────────────────────────
// Runs asynchronously on MediaPipe's cadence; we store results and consume in RAF.
function onHandsResults(results){
  handResultsPending = results;
}

// ─── Process Hand Data (called once per RAF frame) ────────────────────────────
function processHandData(ts){
  const results = handResultsPending;
  if(!results) return;

  const hasHands = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;

  // Update HUD (only when changed — avoid layout thrash)
  const dotClass = hasHands ? 'hud-dot' : 'hud-dot inactive';
  if(handDot.className !== dotClass) handDot.className = dotClass;
  const statusText = hasHands
    ? `${results.multiHandLandmarks.length} hand${results.multiHandLandmarks.length>1?'s':''} detected`
    : 'No hand detected';
  if(handStatus.textContent !== statusText) handStatus.textContent = statusText;

  canvasHand.width  = window.innerWidth;
  canvasHand.height = window.innerHeight;

  if(!hasHands){
    smoothedHands[0]=null; smoothedHands[1]=null;
    spawnTime=0; spawnFired=false;
    deleteTime=0; deleteFired=false;
    twoHandScaleBase=null; twoHandScaleObj=null;
    spawnProgress.style.display='none';
    setGesturePill('✋ Ready');
    // Release grabs
    for(let i=0;i<2;i++){
      if(grab[i].obj){ grab[i].obj.grabbed=false; grab[i].obj=null; }
    }
    pointer.classList.remove('pinching');
    return;
  }

  // Smooth each hand
  const numHands = Math.min(results.multiHandLandmarks.length, 2);
  for(let hi=0; hi<numHands; hi++){
    smoothedHands[hi] = oefHands[hi].smooth(results.multiHandLandmarks[hi], ts/1000);
  }
  for(let hi=numHands; hi<2; hi++) smoothedHands[hi]=null;

  // Draw skeleton
  for(let hi=0; hi<numHands; hi++){
    drawHand(smoothedHands[hi], hi, ts);
  }
  drawParticles();

  // ── Primary hand (index 0) ────────────────────────────────────────────────
  const lms0 = smoothedHands[0];
  const indexTip = lms0[8];
  const thumbTip = lms0[4];

  // Pointer position: smoothed screen coord of index tip
  const rawSX = lmToScreen(indexTip).x;
  const rawSY = lmToScreen(indexTip).y;
  ptrSX = ptrFilterX.filter(rawSX, ts/1000);
  ptrSY = ptrFilterY.filter(rawSY, ts/1000);

  pointer.style.left = ptrSX + 'px';
  pointer.style.top  = ptrSY + 'px';

  const pinching  = isPinch(lms0);
  const openPalm  = isOpenPalm(lms0);
  const fist      = isFist(lms0);
  const peace     = isPeace(lms0);

  // ── Two-hand scaling ──────────────────────────────────────────────────────
  if(numHands >= 2){
    const lms1 = smoothedHands[1];
    const d = dist2(lms0[9], lms1[9]);
    if(twoHandScaleBase === null){
      twoHandScaleBase = d;
      twoHandScaleObj  = selectedObject;
    } else if(twoHandScaleObj && !twoHandScaleObj.dying){
      const factor = d / twoHandScaleBase;
      const target = Math.max(0.15, Math.min(4.0, factor));
      twoHandScaleObj.scale += (target - twoHandScaleObj.scale)*0.18;
      twoHandScaleBase = d*0.97 + twoHandScaleBase*0.03;
    }
    setGesturePill('🤲 Scaling');
  } else {
    twoHandScaleBase = null;
    twoHandScaleObj  = null;
  }

  // ── Peace: toggle focus mode ───────────────────────────────────────────────
  if(peace && !pinching){
    if(!peaceWas){ focusMode=!focusMode; showGesture(focusMode?'✌️ Focus on':'✌️ Focus off'); }
    peaceWas = true;
  } else {
    peaceWas = false;
  }

  // ── Spawn: open palm hold ─────────────────────────────────────────────────
  if(openPalm && numHands===1){
    if(spawnTime===0) spawnTime=ts;
    const elapsed   = ts - spawnTime;
    const progress  = Math.min(elapsed/1000, 1);
    const circ      = 150.8;
    spawnArcFill.setAttribute('stroke-dasharray', `${progress*circ} ${circ}`);
    const palmPos = lmToScreen(lms0[9]);
    spawnProgress.style.display='block';
    spawnProgress.style.left  = (palmPos.x-30)+'px';
    spawnProgress.style.top   = (palmPos.y-30)+'px';
    if(elapsed >= 1000 && !spawnFired){
      spawnFired = true;
      const wp = screenToWorld(ptrSX, ptrSY, 0);
      spawnObject(wp.x, wp.y, wp.z);
      spawnTime = ts; spawnFired = false; // allow respawn
    }
    setGesturePill('✋ Spawn…');
  } else {
    spawnTime=0; spawnFired=false;
    spawnProgress.style.display='none';
  }

  // ── Pinch: grab/select ────────────────────────────────────────────────────
  const wasPinching = pinch[0].active;
  pinch[0].active   = pinching;

  if(pinching){
    pointer.classList.add('pinching');
    const hovered = raycastObjects(ptrSX, ptrSY);

    if(!wasPinching){
      // Pinch start
      if(hovered){
        selectObject(hovered);
        grab[0].obj = hovered;
        hovered.grabbed = true;
        const wp = screenToWorld(ptrSX, ptrSY, hovered.posZ);
        grab[0].offX   = hovered.posX - wp.x;
        grab[0].offY   = hovered.posY - wp.y;
        grab[0].prevLmZ = indexTip.z;
        showGesture('👌 Grabbed');
      } else {
        selectObject(null);
      }
    } else {
      // Pinch hold: move grabbed object
      const gobj = grab[0].obj;
      if(gobj && !gobj.dying){
        const wp = screenToWorld(ptrSX, ptrSY, gobj.posZ);
        const tx = wp.x + grab[0].offX;
        const ty = wp.y + grab[0].offY;
        gobj.posX += (tx - gobj.posX)*0.22;
        gobj.posY += (ty - gobj.posY)*0.22;

        // Z from hand depth landmark
        if(grab[0].prevLmZ !== null){
          const dz = (indexTip.z - grab[0].prevLmZ)*9;
          gobj.posZ -= dz*0.12;
          gobj.posZ  = Math.max(-3, Math.min(3, gobj.posZ));
        }
        grab[0].prevLmZ = indexTip.z;

        // Rotation from hand orientation
        const mcp=lms0[5], pinkyMcp=lms0[17], wrist=lms0[0];
        const handYaw   = Math.atan2(pinkyMcp.y-mcp.y, pinkyMcp.x-mcp.x);
        const handPitch = Math.atan2(mcp.z-wrist.z, mcp.y-wrist.y)*0.5;
        gobj.rotY += (handYaw*0.3   - gobj.rotY)*0.06;
        gobj.rotX += (handPitch*0.5 - gobj.rotX)*0.06;

        gobj.mesh.position.set(gobj.posX, gobj.posY, gobj.posZ);
        gobj.mesh.rotation.set(gobj.rotX, gobj.rotY, gobj.rotZ);
      }
    }
  } else {
    pointer.classList.remove('pinching');
    if(wasPinching && grab[0].obj){
      grab[0].obj.grabbed = false;
      grab[0].obj = null;
      showGesture('👋 Released');
    }
  }

  // ── Fist: delete selected ─────────────────────────────────────────────────
  if(fist && selectedObject && !selectedObject.dying){
    if(deleteTime===0) deleteTime=ts;
    if(ts-deleteTime >= 1000 && !deleteFired){
      deleteFired=true;
      deleteObject(selectedObject);
      selectObject(null);
    }
    setGesturePill('✊ Delete…');
  } else {
    if(!fist){ deleteTime=0; deleteFired=false; }
  }

  // ── Hover ─────────────────────────────────────────────────────────────────
  if(!pinching){
    const hov = raycastObjects(ptrSX, ptrSY);
    for(let i=0;i<objects.length;i++){
      const o=objects[i];
      const isH = o===hov;
      if(isH !== o.hovered) o.hovered=isH;
    }
    if(hov && !hov.selected) setGesturePill('👆 Hover — pinch to grab');
    else if(!openPalm && !fist && !peace) setGesturePill('✋ Ready');
  }

  // ── Inspector update ──────────────────────────────────────────────────────
  if(selectedObject && !selectedObject.dying){
    const o = selectedObject;
    const R2D = 180/Math.PI;
    inspEls.id.textContent   = '#'+o.id;
    inspEls.type.textContent = o.type;
    inspEls.x.textContent    = o.posX.toFixed(2);
    inspEls.y.textContent    = o.posY.toFixed(2);
    inspEls.z.textContent    = o.posZ.toFixed(2);
    inspEls.rx.textContent   = (o.rotX*R2D).toFixed(1)+'°';
    inspEls.ry.textContent   = (o.rotY*R2D).toFixed(1)+'°';
    inspEls.sc.textContent   = o.scale.toFixed(2)+'x';
    inspEls.st.textContent   = o.grabbed?'Grabbed':o.hovered?'Hovered':'Selected';
  }
}

// ─── Master Animation Loop ────────────────────────────────────────────────────
let lastT = 0;
function animate(ts){
  requestAnimationFrame(animate);
  const dt = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts;

  // Consume latest hand data
  processHandData(ts);
  handResultsPending = null; // mark consumed

  // ── Update 3D objects ──────────────────────────────────────────────────────
  for(let i=objects.length-1; i>=0; i--){
    const obj = objects[i];

    if(obj.dying){
      obj.deathProgress += dt*2.2;
      const s = Math.max(0, 1-obj.deathProgress);
      obj.mesh.scale.setScalar(obj.scale*s);
      obj.mesh.material.opacity = s;
      if(obj.deathProgress >= 1){
        scene.remove(obj.mesh);
        // dispose geometry/material
        obj.mesh.geometry.dispose();
        obj.mesh.material.dispose();
        objects.splice(i,1);
        updateObjCount();
      }
      continue;
    }

    // Birth ease
    if(obj.birthProgress < 1){
      obj.birthProgress = Math.min(obj.birthProgress+dt*3, 1);
    }

    const birthEase = 1 - Math.pow(1-obj.birthProgress, 3);
    const scaleTarget = obj.scale * birthEase;

    // Physics drift
    if(!obj.grabbed){
      obj.posX += obj.velX*dt;
      obj.posY += obj.velY*dt;
      obj.velX *= 0.90;
      obj.velY *= 0.90;

      // Sync mesh position smoothly
      obj.mesh.position.x += (obj.posX - obj.mesh.position.x)*0.18;
      obj.mesh.position.y += (obj.posY - obj.mesh.position.y)*0.18;
      obj.mesh.position.z += (obj.posZ - obj.mesh.position.z)*0.18;

      // Idle rotation
      obj.rotY += dt * 0.28 * (obj.id%2===0?1:-1);
      obj.mesh.rotation.y = obj.rotY;
      // Float
      obj.mesh.position.y += Math.sin(ts*0.001+obj.id*1.3)*0.0004;
    } else {
      // While grabbed, mesh tracks directly
      obj.mesh.position.set(obj.posX, obj.posY, obj.posZ);
      obj.mesh.rotation.set(obj.rotX, obj.rotY, obj.rotZ);
    }

    // Hover/select emissive
    const targetEm = (obj.hovered||obj.selected) ? 0.28 : 0.07;
    obj.mesh.material.emissiveIntensity += (targetEm-obj.mesh.material.emissiveIntensity)*0.12;

    // Scale
    const baseS = obj.grabbed ? scaleTarget : ((obj.hovered&&!obj.grabbed) ? scaleTarget*1.07 : scaleTarget);
    obj.mesh.scale.setScalar(baseS);

    // Outline
    obj.outline.visible = obj.selected || obj.hovered;
  }

  renderer.render(scene, cam3d);
}
requestAnimationFrame(animate);

// ─── MediaPipe Setup ──────────────────────────────────────────────────────────
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.75,
  minTrackingConfidence: 0.75,
});
hands.onResults(onHandsResults);

const mpCamera = new Camera(video, {
  onFrame: async () => { await hands.send({image: video}); },
  width: 1280, height: 720,
});
mpCamera.start().catch(e => console.error('Camera start failed:', e));

// Welcome object
setTimeout(() => {
  spawnObject(0, 0.1, 0);
  showGesture('👋 Welcome! Try gestures');
}, 2200);
</script>
